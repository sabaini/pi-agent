name: pi-agent
title: Pi Agent
base: core24
adopt-info: pi
summary: Terminal coding agent
description: |
  Pi is a minimal terminal coding agent harness. This snap packages the
  published Linux binary release and runs with classic confinement so it can
  operate on arbitrary project directories and invoke the host toolchain.

license: MIT
website: https://pi.dev
source-code: https://github.com/earendil-works/pi
issues: https://github.com/earendil-works/pi/issues
contact: https://github.com/earendil-works/pi/issues

grade: devel
confinement: classic

platforms:
  amd64:

apps:
  pi:
    command: bin/pi
    aliases:
      - pi

parts:
  staged-tools:
    plugin: nil
    # Auto-patch only distro helper packages here. The Pi release binary is
    # patched explicitly in its part so patchelf operations happen in a safe order.
    build-attributes:
      - enable-patchelf
    stage-packages:
      - ca-certificates
      - fd-find
      - git
      - ripgrep

  pi:
    plugin: nil
    build-packages:
      - ca-certificates
      - curl
      - patchelf
      - tar
    override-build: |
      set -eu

      version="${PI_AGENT_VERSION:-}"
      if [ -z "$version" ]; then
        release_repo="${PI_AGENT_RELEASE_REPO:-earendil-works/pi-mono}"
        latest_api_url="${PI_AGENT_LATEST_RELEASE_API_URL:-https://api.github.com/repos/$release_repo/releases/latest}"
        tag="$(curl --fail --location --show-error --retry 5 --retry-delay 2 \
          --header 'Accept: application/vnd.github+json' \
          --header 'X-GitHub-Api-Version: 2022-11-28' \
          "$latest_api_url" |
          tr -d '\n\r' |
          sed -n 's/.*"tag_name"[[:space:]]*:[[:space:]]*"\([^"]*\)".*/\1/p')"
        version="$tag"
      fi
      version="${version#v}"
      [ -n "$version" ] || {
        echo 'could not determine Pi release version' >&2
        exit 1
      }

      craftctl set version="$version"
      PI_AGENT_VERSION="$version" "$CRAFT_PROJECT_DIR/snap/local/fetch-release.sh"

      # Satisfy the classic confinement linter for the prebuilt ELF executable.
      # Set RPATH before the longer interpreter; doing this in the opposite order
      # can leave this Bun-produced executable with invalid program headers.
      patchelf --force-rpath --set-rpath /snap/core24/current/lib/x86_64-linux-gnu "$CRAFT_PART_INSTALL/pi/pi"
      patchelf --set-interpreter /snap/core24/current/lib64/ld-linux-x86-64.so.2 "$CRAFT_PART_INSTALL/pi/pi"

      install -Dm755 "$CRAFT_PROJECT_DIR/snap/local/pi" "$CRAFT_PART_INSTALL/bin/pi"
